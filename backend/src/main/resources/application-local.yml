spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${POSTGRES_DB:vacina_kids}
    username: ${POSTGRES_USER:vacina_user}
    password: ${POSTGRES_PASSWORD:senha_local}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: false

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always

app:
  jwt:
    secret: ${JWT_SECRET:chave_segura}
    access-expiration-minutes: ${JWT_ACCESS_EXPIRATION_MINUTES:15}
    refresh-expiration-days: ${JWT_REFRESH_EXPIRATION_DAYS:7}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}
