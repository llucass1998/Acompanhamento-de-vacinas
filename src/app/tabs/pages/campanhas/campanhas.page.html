<app-page-header title="Campanhas"></app-page-header>

<ion-content>
  <div class="page-container">
    <div class="section-row" style="margin-top: 0">
      <div>
        <h2 class="section-heading">Campanhas Ativas</h2>
        <p class="section-caption">
          Fique por dentro das iniciativas do Ministério da Saúde e proteja sua família.
        </p>
      </div>
    </div>

    <div class="card-grid" *ngIf="campanhas.length > 0">
      <ion-card class="custom-card" *ngFor="let campanha of campanhas" style="display: flex; flex-direction: column; border-top: 4px solid var(--app-primary)">
        <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-3)">
          <h3 style="margin: 0; font-size: 18px; color: var(--app-primary)">{{ campanha.title }}</h3>
          <span class="badge-status" style="background: var(--app-primary-soft); color: var(--app-primary); font-size: 11px">Ativa</span>
        </div>

        <p class="text-secondary" style="margin: 0 0 var(--space-4) 0; flex: 1">{{ campanha.description }}</p>

        <div style="display: flex; flex-direction: column; gap: var(--space-2); padding-top: var(--space-3); border-top: 1px solid var(--app-border)">
          <div style="display: flex; align-items: flex-start; gap: var(--space-2)">
            <ion-icon name="people-outline" class="text-secondary" style="margin-top: 2px"></ion-icon>
            <div style="display: flex; flex-direction: column">
              <span class="text-secondary" style="font-size: 12px; text-transform: uppercase; font-weight: 700">Público-alvo</span>
              <span class="font-bold" style="font-size: 14px">{{ campanha.targetAudience }}</span>
            </div>
          </div>

          <div style="display: flex; align-items: flex-start; gap: var(--space-2); margin-top: var(--space-2)">
            <ion-icon name="calendar-outline" class="text-secondary" style="margin-top: 2px"></ion-icon>
            <div style="display: flex; flex-direction: column">
              <span class="text-secondary" style="font-size: 12px; text-transform: uppercase; font-weight: 700">Período</span>
              <span class="font-bold" style="font-size: 14px">{{ campanha.startDate | date:'dd/MM' }} até {{ campanha.endDate | date:'dd/MM/yyyy' }}</span>
            </div>
          </div>
        </div>
      </ion-card>
    </div>

    <app-empty-state 
      *ngIf="campanhas.length === 0" 
      icon="calendar-outline" 
      title="Nenhuma campanha" 
      message="Não há campanhas de vacinação ativas no momento.">
    </app-empty-state>
  </div>
</ion-content>
