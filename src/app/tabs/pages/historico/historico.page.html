<app-page-header title="Histórico" subtitle="Acompanhe todas as vacinas aplicadas."></app-page-header>

<ion-content>
  <div class="page-container">
    <div style="margin-bottom: var(--space-6)" *ngIf="criancas.length > 0">
      <div style="display: flex; flex-direction: column; gap: var(--space-2)">
        <label style="font-size: 14px; font-weight: 600; color: var(--app-text-primary)">Criança selecionada</label>
        <select 
          class="custom-select" 
          [(ngModel)]="criancaSelecionadaId" 
          (change)="onCriancaChange()"
          style="padding: var(--space-3); border: 1px solid var(--app-border); border-radius: var(--radius-md); background: var(--app-surface); color: var(--app-text-primary); font-family: inherit; font-size: 16px;">
          <option *ngFor="let crianca of criancas" [value]="crianca.id">{{ crianca.name }}</option>
        </select>
      </div>
    </div>

    <!-- Timeline Wrapper -->
    <div *ngIf="criancaSelecionadaId">
      <div class="timeline" *ngIf="historico.length > 0">
        <div class="timeline-item" *ngFor="let registro of historico">
          <div class="timeline-marker" [ngClass]="registro.status">
            <ion-icon [name]="registro.status === 'TOMADA' ? 'checkmark-circle-outline' : 'time-outline'"></ion-icon>
          </div>
          
          <div class="timeline-content">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: var(--space-2)">
              <h3 style="margin: 0; font-size: 16px; font-weight: 700; color: var(--app-text-primary)">
                {{ registro.vaccineName }}
              </h3>
              <span class="timeline-badge" [ngClass]="registro.status">
                {{ registro.status }}
              </span>
            </div>
            
            <p class="text-secondary" style="margin: 0 0 var(--space-2) 0; font-size: 14px">
              Dose: {{ registro.doseName }}
            </p>
            
            <div style="display: flex; gap: var(--space-4); margin-top: var(--space-3); padding-top: var(--space-3); border-top: 1px dashed var(--app-border)">
              <div style="display: flex; flex-direction: column" *ngIf="registro.appliedDate">
                <span class="text-secondary" style="font-size: 11px; text-transform: uppercase; font-weight: 600">Aplicada em</span>
                <span style="font-size: 14px; color: var(--app-text-primary); font-weight: 500">{{ registro.appliedDate | date:'dd/MM/yyyy' }}</span>
              </div>
              <div style="display: flex; flex-direction: column" *ngIf="!registro.appliedDate">
                <span class="text-secondary" style="font-size: 11px; text-transform: uppercase; font-weight: 600">Prevista para</span>
                <span style="font-size: 14px; color: var(--app-text-primary); font-weight: 500">{{ registro.dueDate | date:'dd/MM/yyyy' }}</span>
              </div>
            </div>
          </div>
        </div>
      </div>

      <app-empty-state 
        *ngIf="historico.length === 0"
        icon="document-text-outline" 
        title="Nenhum registro" 
        message="Esta criança ainda não possui registros no histórico de vacinação."
        actionLabel="Voltar para Crianças"
        [routerLink]="['/tabs/crianca']">
      </app-empty-state>
    </div>

    <!-- Empty State Global -->
    <app-empty-state 
      *ngIf="criancas.length === 0"
      icon="people-outline" 
      title="Nenhuma criança cadastrada" 
      message="Cadastre uma criança primeiro para ver o histórico de vacinação."
      actionLabel="Cadastrar Criança"
      [routerLink]="['/tabs/crianca']">
    </app-empty-state>

  </div>
</ion-content>
