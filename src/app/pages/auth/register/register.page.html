<ion-header class="ion-no-border">
  <ion-toolbar style="--padding-top: var(--space-4); --padding-start: var(--space-2); --background: transparent">
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/login" text="Voltar" color="primary"></ion-back-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="ion-padding">
  <div class="page-container" style="max-width: 480px; margin: 0 auto; padding-top: var(--space-2)">
    <div style="text-align: center; margin-bottom: var(--space-8)">
      <h1 style="font-size: 28px; margin: 0 0 var(--space-2)">Junte-se a nós</h1>
      <p class="text-secondary" style="font-size: 16px; margin: 0">Cadastre-se para gerenciar o calendário de vacinas das suas crianças.</p>
    </div>

    <ion-card class="custom-card" style="padding: var(--space-6)">
      <form (ngSubmit)="register()" #form="ngForm">
        <ion-item class="custom-input">
          <ion-icon name="person-outline" slot="start" class="text-secondary" style="margin-right: var(--space-3)"></ion-icon>
          <ion-input 
            type="text" 
            label="Nome completo"
            labelPlacement="floating"
            [(ngModel)]="userData.name" 
            name="name"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="custom-input">
          <ion-icon name="mail-outline" slot="start" class="text-secondary" style="margin-right: var(--space-3)"></ion-icon>
          <ion-input 
            type="email" 
            label="E-mail"
            labelPlacement="floating"
            [(ngModel)]="userData.email" 
            name="email"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="custom-input">
          <ion-icon name="lock-closed-outline" slot="start" class="text-secondary" style="margin-right: var(--space-3)"></ion-icon>
          <ion-input 
            type="password" 
            label="Senha (Min. 8 chars, 1 Maiúscula, 1 Número, 1 Especial ex: @)"
            labelPlacement="floating"
            [(ngModel)]="userData.password" 
            name="password"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="custom-input" style="margin-bottom: var(--space-2)">
          <ion-icon name="shield-checkmark-outline" slot="start" class="text-secondary" style="margin-right: var(--space-3)"></ion-icon>
          <ion-input 
            type="password" 
            label="Confirme a senha"
            labelPlacement="floating"
            [(ngModel)]="userData.confirmPassword" 
            name="confirmPassword"
            required>
          </ion-input>
        </ion-item>

        <div *ngIf="errorMessage" style="margin: var(--space-4) 0; padding: var(--space-3); background: var(--app-danger-soft); border-radius: var(--radius-sm); border: 1px solid rgba(194, 65, 58, 0.2)">
          <p style="color: var(--app-danger); margin: 0; font-size: 14px; display: flex; align-items: center; gap: var(--space-2)">
            <ion-icon name="alert-circle-outline"></ion-icon>
            {{ errorMessage }}
          </p>
        </div>

        <ion-button type="submit" expand="block" class="main-button" style="margin-top: var(--space-6)" [disabled]="isLoading">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Criar Conta Gratuita</span>
        </ion-button>
      </form>
    </ion-card>
  </div>
</ion-content>
