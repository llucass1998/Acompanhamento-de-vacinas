<ion-content class="ion-padding">
  <div class="page-container" style="max-width: 480px; margin: 0 auto; display: flex; flex-direction: column; justify-content: center; min-height: 100%">
    <div style="text-align: center; margin-bottom: var(--space-8)">
      <div style="width: 80px; height: 80px; background: var(--app-surface); border-radius: var(--radius-xl); box-shadow: var(--shadow-sm); display: flex; align-items: center; justify-content: center; margin: 0 auto var(--space-4)">
        <img src="assets/logo-vacina.png" alt="Vacina Kids" style="width: 56px; height: 56px; border-radius: var(--radius-lg); object-fit: cover" />
      </div>
      <h1 style="font-size: 28px; margin: 0 0 var(--space-2)">Vacina Kids</h1>
      <p class="text-secondary" style="font-size: 16px; margin: 0">Acompanhe a vacinação da sua família com segurança e facilidade.</p>
    </div>

    <ion-card class="custom-card" style="padding: var(--space-6)">
      <form (ngSubmit)="login()" #form="ngForm">
        <ion-item class="custom-input">
          <ion-icon name="mail-outline" slot="start" class="text-secondary" style="margin-right: var(--space-3)"></ion-icon>
          <ion-input 
            type="email" 
            label="E-mail"
            labelPlacement="floating"
            [(ngModel)]="credentials.email" 
            name="email"
            required>
          </ion-input>
        </ion-item>

        <ion-item class="custom-input" style="margin-bottom: var(--space-2)">
          <ion-icon name="lock-closed-outline" slot="start" class="text-secondary" style="margin-right: var(--space-3)"></ion-icon>
          <ion-input 
            type="password" 
            label="Senha"
            labelPlacement="floating"
            [(ngModel)]="credentials.password" 
            name="password"
            required>
          </ion-input>
        </ion-item>

        <div *ngIf="errorMessage" style="margin: var(--space-4) 0; padding: var(--space-3); background: var(--app-danger-soft); border-radius: var(--radius-sm); border: 1px solid rgba(194, 65, 58, 0.2)">
          <p style="color: var(--app-danger); margin: 0; font-size: 14px; display: flex; align-items: center; gap: var(--space-2)">
            <ion-icon name="alert-circle-outline"></ion-icon>
            {{ errorMessage }}
          </p>
        </div>

        <ion-button type="submit" expand="block" class="main-button" style="margin-top: var(--space-6)" [disabled]="isLoading || !form.valid">
          <ion-spinner *ngIf="isLoading" name="crescent"></ion-spinner>
          <span *ngIf="!isLoading">Entrar na plataforma</span>
        </ion-button>
      </form>
      
      <div style="text-align: center; margin-top: var(--space-6); padding-top: var(--space-6); border-top: 1px solid var(--app-border)">
        <p class="text-secondary" style="font-size: 14px; margin: 0">
          Ainda não tem uma conta? 
          <a routerLink="/register" style="color: var(--app-primary); font-weight: 700; text-decoration: none; margin-left: var(--space-1)">Cadastre-se</a>
        </p>
      </div>
    </ion-card>
  </div>
</ion-content>
